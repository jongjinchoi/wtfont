name: Pre-warm Cache

on:
  schedule:
    # Every 14 days (1st and 15th of each month at 06:00 UTC)
    - cron: "0 6 1,15 * *"
  workflow_dispatch: # Manual trigger

jobs:
  pre-warm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tsx
        run: npm install -g tsx

      - name: Run pre-warm script
        run: npx tsx scripts/pre-warm.ts
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL }}
